version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: lms-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: lmsfilmes
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./lmsfilmes/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - lms-network

  # MongoDB Express - Database Admin UI
  mongo-express:
    image: mongo-express:1.0.2
    container_name: lms-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - lms-network

  # Redis (Cache / Message Broker leve)
  redis:
    image: redis:7.2
    container_name: lms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lms-network

  # RabbitMQ (Message Broker)
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: lms-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - lms-network

  # Backend API (Spring Boot)
  backend:
    build: ./lmsfilmes
    container_name: lms-backend-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: lmsfilmes
      MONGO_USER: admin
      MONGO_PASSWORD: admin123

      REDIS_HOST: redis
      REDIS_PORT: 6379

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin123
      RABBITMQ_VHOST: /
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - lms-network

  # Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: lms-frontend-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    networks:
      - lms-network

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  lms-network:
    driver: bridge
