name: Frontend Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_push_docker_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend # Altere para o caminho real do submodule
          file: ./frontend/Dockerfile # Altere para o caminho real do Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/seu_frontend_image_name:${{ github.sha }}, ${{ secrets.DOCKER_HUB_USERNAME }}/seu_frontend_image_name:latest

  run_docker_image:
    runs-on: ubuntu-latest
    needs: build_and_push_docker_image
    steps:
      - name: Run Docker container
        run: docker run --rm -p 3000:3000 ${{ secrets.DOCKER_HUB_USERNAME }}/seu_frontend_image_name:latest
